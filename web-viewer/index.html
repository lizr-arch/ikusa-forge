<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <title>Ikusa Forge SVG Replay Viewer</title>
  </head>
  <body>
    <div id="app" class="app-shell">
      <header class="topbar">
        <div>
          <h1>SVG Replay Viewer</h1>
          <div id="metadata" class="metadata">No replay loaded</div>
        </div>
        <div id="status" class="status-line" role="status">Ready</div>
      </header>

      <main class="workspace">
        <section class="board-panel" aria-labelledby="board-heading">
          <div class="panel-heading">
            <h2 id="board-heading">Board</h2>
            <div id="tick-readout" class="tick-readout">Tick 0</div>
          </div>
          <div id="board" class="board-host"></div>
        </section>

        <aside class="side-panel" aria-label="Replay tools">
          <section class="panel-block" aria-labelledby="loader-heading">
            <h2 id="loader-heading">Loader</h2>
            <label class="file-label">
              <span>replay.json</span>
              <input id="replay-file" type="file" accept="application/json,.json" />
            </label>
            <label class="file-label">
              <span>battle_report.json</span>
              <input id="report-file" type="file" accept="application/json,.json" />
            </label>
            <button id="load-files" type="button" class="primary-button">Load files</button>
          </section>

          <section class="panel-block" aria-labelledby="controls-heading">
            <h2 id="controls-heading">Playback</h2>
            <div class="control-row">
              <button id="play-pause" type="button">Play</button>
              <button id="step-tick" type="button">Step Tick</button>
            </div>
            <div class="control-row">
              <button id="previous-event" type="button">Previous Event</button>
              <button id="next-event" type="button">Next Event</button>
            </div>
            <label class="range-label">
              <span>Tick</span>
              <input id="tick-slider" type="range" min="0" max="0" value="0" />
            </label>
            <label class="select-label">
              <span>Speed</span>
              <select id="speed-select">
                <option value="0.5">0.5x</option>
                <option value="1" selected>1x</option>
                <option value="2">2x</option>
                <option value="4">4x</option>
              </select>
            </label>
          </section>

          <section class="panel-block" aria-labelledby="unit-heading">
            <h2 id="unit-heading">Unit Detail</h2>
            <div id="unit-detail"></div>
          </section>

          <section class="panel-block report-block" aria-labelledby="report-heading">
            <h2 id="report-heading">Battle Report</h2>
            <div id="report"></div>
          </section>
        </aside>
      </main>

      <section class="timeline-panel" aria-labelledby="timeline-heading">
        <div class="panel-heading">
          <h2 id="timeline-heading">Timeline</h2>
        </div>
        <div id="timeline"></div>
      </section>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
